name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:3.10-slim
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y \
          wget \
          curl \
          gnupg \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libncurses5-dev \
          libncursesw5-dev \
          autoconf \
          automake \
          libtool \
          cmake \
          unzip \
          lld \
          zip \
          libltdl-dev
    
    - name: Install Java 17 (Temurin)
      run: |
        # Temurin JDK 17 installieren
        wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.15%2B6/OpenJDK17U-jdk_x64_linux_hotspot_17.0.15_6.tar.gz
        tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.15_6.tar.gz
        mv jdk-17.0.15+6 /opt/jdk-17
        export JAVA_HOME=/opt/jdk-17
        export PATH=$JAVA_HOME/bin:$PATH
        echo "JAVA_HOME=/opt/jdk-17" >> $GITHUB_ENV
        echo "/opt/jdk-17/bin" >> $GITHUB_PATH
        java -version
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer
    
