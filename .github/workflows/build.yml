name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libncurses5-dev \
          libncursesw5-dev \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          cmake \
          unzip \
          lld \
          wget \
          curl \
          zip
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer
    
    - name: Setup Android SDK
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        
        cd $SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-11076708_latest.zip
        
        # Symlink für Buildozer
        mkdir -p $SDK_ROOT/tools/bin
        ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
        
        # SDK Root explizit setzen
        export ANDROID_SDK_ROOT=$SDK_ROOT
        
        # Lizenzen akzeptieren
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses
        
        # Build-Tools installieren
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT "build-tools;33.0.0" "platform-tools" "platforms;android-33"
        
        echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
    
    - name: Create dummy icon
      run: |
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
        cp icon.png presplash.png
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JustizTool-APK
        path: bin/*.apk
