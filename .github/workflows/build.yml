name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libncurses5-dev \
          libncursesw5-dev \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          cmake \
          unzip \
          lld \
          wget \
          curl \
          zip
    
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer
    
    - name: Build APK (erster Versuch - lädt SDK)
      run: |
        buildozer android debug || true
    
    - name: Fix Android SDK Build-Tools
      run: |
        # SDK Verzeichnis
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        
        # Falls cmdline-tools noch nicht da sind
        if [ ! -d "$SDK_DIR/cmdline-tools" ]; then
          cd $SDK_DIR
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
        fi
        
        # Pfad setzen
        export PATH=$PATH:$SDK_DIR/cmdline-tools/bin
        
        # Lizenzen akzeptieren
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | sdkmanager --licenses
        
        # Build-Tools installieren
        sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
        
        # Build-Tools an die von Buildozer erwartete Stelle verlinken/kopieren
        if [ -d "$SDK_DIR/build-tools/33.0.0" ] && [ ! -d "$SDK_DIR/build-tools" ]; then
          mkdir -p $SDK_DIR/build-tools
        fi
        
        # Symbolischen Link erstellen falls nötig
        if [ ! -e "$SDK_DIR/build-tools/33.0.0/aidl" ] && [ -e "$SDK_DIR/build-tools/33.0.0/aidl" ]; then
          echo "Build-Tools OK"
        fi
        
        # Prüfen ob aidl existiert
        find $SDK_DIR -name "aidl" 2>/dev/null
    
    - name: Build APK (zweiter Versuch)
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JustizTool-APK
        path: bin/*.apk
