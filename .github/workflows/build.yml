name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:3.10-slim
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libncurses5-dev \
          libncursesw5-dev \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          cmake \
          unzip \
          lld \
          wget \
          curl \
          zip \
          libltdl-dev
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer==1.5.0
    
    - name: Create dummy icon files
      run: |
        # Dummy Icon und Presplash erstellen
        convert -size 512x512 xc:blue -pointsize 100 -fill white -gravity center -annotate +0+0 "J" icon.png 2>/dev/null || echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
        cp icon.png presplash.png
    
    - name: Build APK with Buildozer
      run: |
        buildozer android debug || true
        # Falls Build fehlschlägt, SDK manuell reparieren
        if [ ! -f bin/*.apk ]; then
          echo "Erster Build fehlgeschlagen, repariere SDK..."
          
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          
          # SDK cmdline-tools installieren
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip
          
          # Symlink für Buildozer
          mkdir -p $SDK_DIR/tools/bin
          ln -s $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          
          # Lizenzen akzeptieren
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Build-Tools installieren
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
          
          # Erneut bauen
          buildozer android debug
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JustizTool-APK
        path: |
          bin/*.apk
          *.apk
